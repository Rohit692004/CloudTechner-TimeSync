name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: timesheet
          POSTGRES_PASSWORD: timesheet
          POSTGRES_DB: timesheet
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://timesheet:timesheet@localhost:5434/timesheet
      AUTH_SECRET: ci-build-secret-ci-build-secret-ci-build-secret
      AUTH_TRUST_HOST: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma migrate deploy
      - run: npx tsc --noEmit
      - run: npm run build
